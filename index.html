<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Celestial Link Hub</title>
    <meta
      name="description"
      content="A minimalist monochrome cosmic personal landing page with social links."
    />
    <link rel="icon" type="image/svg+xml" href="favicon.svg" />
    <link rel="alternate icon" href="favicon.ico" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="sky-art" aria-hidden="true">
      <div class="sky-glow"></div>
      <img class="moon-image" src="./assets/imp.png" alt="" />
      <div class="stars stars-small" id="stars-small"></div>
      <div class="stars stars-large" id="stars-large"></div>
      <div class="grain"></div>
    </div>

    <main class="page" role="main">
      <section class="hero" aria-label="Profile and social links">
        <img
          id="profile-image"
          class="avatar"
          src="https://images.unsplash.com/photo-1535713875002-d1d0cf377fde?auto=format&fit=crop&w=300&q=80"
          alt="Profile avatar"
        />

        <h1 id="display-name">Cyro</h1>
        <p id="bio-text">Art Of Being • Implicit</p>

        <nav class="links" id="social-links" aria-label="Social links"></nav>
      </section>
    </main>

    <footer class="footer" id="footer-text"></footer>

    <script src="script.js"></script>
  </body>
</html>
